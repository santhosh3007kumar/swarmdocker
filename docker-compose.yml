version: "3.8"

services:

  backend:
    image: 352311919031.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfbackend:latest

    deploy:
      replicas: 1

      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback   # 🔥 auto rollback
        monitor: 15s
        max_failure_ratio: 0.2

      rollback_config:
        parallelism: 1
        delay: 5s

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

    networks:
      - appnet


  frontend:
    image: 352311919031.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfrontend:latest

    deploy:
      replicas: 1

      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback

      rollback_config:
        parallelism: 1
        delay: 5s

      restart_policy:
        condition: on-failure

    networks:
      - appnet


  nginx:
    image: nginx:alpine

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    deploy:
      replicas: 1

      restart_policy:
        condition: any

    networks:
      - appnet


networks:
  appnet:
    driver: overlay