version: "3.8"

services:

  foodapp_backend:
    image: 352311919031.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfbackend:${IMAGE_TAG:-latest}
    ports:
      - "4000:4000"
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: pause
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  foodapp_frontend:
    # BUG 1 FIXED: was swarmtaskfbackend — changed to swarmtaskfrontend
    image: 352311919031.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfrontend:${IMAGE_TAG:-latest}
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 20s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: pause
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  foodapp_nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 15s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: pause

networks:
  appnet:
    driver: overlay
    attachable: true

configs:
  nginx_conf:
    # BUG 4 FIXED: nginx.conf is a separate file — not pasted inside this file
    file: ./nginx.conf
