version: "3.8"

services:

  foodapp_backend:
    image: 352311919031.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfbackend:latest
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  foodapp_frontend:
    image: 352311919031.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfrontend:latest
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first

  foodapp_nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first

networks:
  appnet:
    driver: overlay
    attachable: true

configs:
  nginx_conf:
    file: ./nginx.conf