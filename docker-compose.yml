version: '3.8'

services:
  foodapp_backend:
    image: 352311919031.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfbackend:latest
    expose:
      - "4000"
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      retries: 3
      timeout: 10s

  foodapp_frontend:
    image: 352311919031.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfrontend:latest
    expose:
      - "80"
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  foodapp_nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    command: ["sh", "-c", "sleep 10 && nginx -g 'daemon off;'"]

networks:
  appnet:
    driver: overlay
    attachable: true