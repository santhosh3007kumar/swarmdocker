name: Rollback Swarm Service

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to confirm FULL rollback"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest

    # ✅ Correct place for approval
    environment: production

    steps:

    # ----------------------------
    # CONFIRMATION CHECK
    # ----------------------------
    - name: Validate confirmation
      run: |
        if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
          echo "❌ Rollback cancelled — confirmation not provided"
          exit 1
        fi

    # ----------------------------
    # AWS LOGIN
    # ----------------------------
    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1

    # ----------------------------
    # FULL STACK ROLLBACK
    # ----------------------------
    - name: Rollback full application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        script: |
          set -e

          STACK="foodapp"

          echo "=============================="
          echo "FULL ROLLBACK TRIGGERED"
          echo "=============================="

          docker service rollback ${STACK}_foodapp_backend
          docker service rollback ${STACK}_foodapp_frontend
          docker service rollback ${STACK}_foodapp_nginx

          echo "Waiting for rollback..."
          sleep 30

          docker service ls

    # ----------------------------
    # SUCCESS / FAILURE
    # ----------------------------
    - name: Success
      if: success()
      run: echo "✅ Rollback completed"

    - name: Failure
      if: failure()
      run: echo "❌ Rollback failed"