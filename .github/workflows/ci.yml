name: CI

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS (OIDC)
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 \
        | docker login --username AWS --password-stdin \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

    # Backend Build & Push
    - name: Build & Push Backend
      run: |
        docker build -t backend:latest ./backend

        # push with commit SHA — CD uses this to pull exact version
        docker tag backend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfbackend:${{ github.sha }}
        docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfbackend:${{ github.sha }}

        # also push :latest for convenience
        docker tag backend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfbackend:latest
        docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfbackend:latest

    # Frontend Build & Push
    - name: Build & Push Frontend
      run: |
        docker build -t frontend:latest ./frontend

        # push with commit SHA — CD uses this to pull exact version
        docker tag frontend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfrontend:${{ github.sha }}
        docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfrontend:${{ github.sha }}

        # also push :latest for convenience
        docker tag frontend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfrontend:latest
        docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/swarmtaskfrontend:latest
