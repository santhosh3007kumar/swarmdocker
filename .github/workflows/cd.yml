name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:

# ============================
# DEPLOY JOB
# ============================
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    environment:
      name: production   # 👈 THIS CREATES APPROVAL STEP

    steps:

    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Deploy to EC2 Swarm
      id: deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        script: |
          set -e
          STACK="foodapp"

          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"

          cd ~/swarmdocker
          git fetch --all
          git reset --hard origin/main

          # SAVE OLD VERSION (for rollback)
          echo "backend $(docker service inspect foodapp_foodapp_backend --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}')" > /tmp/prev_version.txt
          echo "frontend $(docker service inspect foodapp_foodapp_frontend --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}')" >> /tmp/prev_version.txt
          echo "nginx $(docker service inspect foodapp_foodapp_nginx --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}')" >> /tmp/prev_version.txt

          # LOGIN ECR
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

          # PULL NEW IMAGE
          docker pull $ECR_REGISTRY/swarmtaskfbackend:$IMAGE_TAG
          docker pull $ECR_REGISTRY/swarmtaskfrontend:$IMAGE_TAG

          # DEPLOY
          IMAGE_TAG=$IMAGE_TAG docker stack deploy \
            -c docker-compose.yml \
            $STACK \
            --with-registry-auth

          sleep 20

          # HEALTH CHECK
          for i in $(seq 1 12); do
            curl -f -s http://127.0.0.1/api/health && BACKEND=true || BACKEND=false
            curl -f -s http://127.0.0.1/ && FRONTEND=true || FRONTEND=false

            echo "Attempt $i → backend:$BACKEND frontend:$FRONTEND"

            if [ "$BACKEND" = "true" ] && [ "$FRONTEND" = "true" ]; then
              echo "HEALTH CHECK PASSED"
              exit 0
            fi

            sleep 10
          done

          echo "HEALTH CHECK FAILED"
          exit 1

  rollback:
    needs: deploy
    if: ${{ needs.deploy.result == 'failure' }}
    runs-on: ubuntu-latest

    steps:

    - name: Execute Rollback
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        script: |
          set -e
          STACK="foodapp"

          echo "ROLLBACK STARTED"

          BACKEND_IMAGE=$(grep backend /tmp/prev_version.txt | awk '{print $2}')
          FRONTEND_IMAGE=$(grep frontend /tmp/prev_version.txt | awk '{print $2}')
          NGINX_IMAGE=$(grep nginx /tmp/prev_version.txt | awk '{print $2}')

          docker service update --image $BACKEND_IMAGE ${STACK}_foodapp_backend
          docker service update --image $FRONTEND_IMAGE ${STACK}_foodapp_frontend
          docker service update --image $NGINX_IMAGE ${STACK}_foodapp_nginx

          echo "ROLLBACK DONE"