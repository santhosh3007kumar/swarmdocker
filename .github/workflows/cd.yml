name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:  # ✅ FIXED: Add these for OIDC
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1
        role-session-name: GitHubActions-${{ github.repository }}

    - name: ECR Login
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Deploy Services
      id: deploy
      uses: appleboy/ssh-action@v1.0.3
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # ECR login
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin $ECR_REGISTRY
          
          # Pull & update (use --image for latest)
          docker pull $ECR_REGISTRY/swarmtaskfbackend:latest
          docker service update --force --image $ECR_REGISTRY/swarmtaskfbackend:latest foodapp_backend --update-parallelism 1 --update-delay 10s || echo "First deploy, ignoring"
          
          docker pull $ECR_REGISTRY/swarmtaskfrontend:latest
          docker service update --force --image $ECR_REGISTRY/swarmtaskfrontend:latest foodapp_frontend --update-parallelism 1 --update-delay 10s || echo "First deploy, ignoring"
          
          # Status
          docker service ls foodapp

    - name: Health Check
      run: |
        echo "Health check..."
        for i in {1..6}; do
          sleep 10
          if curl -f -s http://${{ secrets.SERVER_IP }}/api/health; then
            echo "✅ Healthy!"
            exit 0
          fi
        done
        echo "❌ Health failed"
        exit 1

    - name: Rollback (Only if Services Have History)
      if: failure() && steps.deploy.outcome == 'success'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🚨 Attempting rollback..."
          docker service rollback foodapp_backend --dry-run 2>/dev/null && \
          docker service rollback foodapp_backend || echo "No rollback history"
          
          docker service rollback foodapp_frontend --dry-run 2>/dev/null && \
          docker service rollback foodapp_frontend || echo "No rollback history"
          
          docker service ls foodapp  # ✅ FIXED syntax