name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    #  Connect to EC2 & deploy
    - name: Deploy to EC2 (Swarm)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

          docker service update --force foodapp_backend
          docker service update --force foodapp_frontend

    # Health Check
    - name: Health Check
      run: |
        echo "Checking application health..."
        sleep 20
        curl -f http://${{ secrets.SERVER_IP }}/api || exit 1

    #  Rollback if failed
    - name: Rollback if Failed
      if: failure()
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Rollback triggered..."
          docker service rollback foodapp_backend
          docker service rollback foodapp_frontend