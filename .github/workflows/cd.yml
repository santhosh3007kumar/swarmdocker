name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1
        role-session-name: GitHubActions-swarmdocker

    - name: ECR Login
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Deploy Stack on EC2
      uses: appleboy/ssh-action@v1.0.3
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/swarmdocker || exit 1

          # Clone repo if not exists, else pull latest
          if [ -d .git ]; then
            git reset --hard
            git pull origin main
          else
            git clone https://github.com/santhosh3007kumar/swarmdocker.git .
          fi

          # Login to ECR
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

          # Backup current stack images
          echo "Saving current stack images for rollback..."
          CURRENT_BACKEND=$(docker service inspect --format='{{.Spec.TaskTemplate.ContainerSpec.Image}}' foodapp_foodapp_backend)
          CURRENT_FRONTEND=$(docker service inspect --format='{{.Spec.TaskTemplate.ContainerSpec.Image}}' foodapp_foodapp_frontend)
          echo "Backend: $CURRENT_BACKEND"
          echo "Frontend: $CURRENT_FRONTEND"

          # Pull new images
          docker pull $ECR_REGISTRY/swarmtaskfbackend:latest
          docker pull $ECR_REGISTRY/swarmtaskfrontend:latest

          # Deploy new stack
          docker stack deploy -c docker-compose.yml foodapp

          # Wait for services to start
          sleep 15
          docker service ls

    - name: Health Check
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          for i in {1..12}; do
            sleep 5
            if curl -f -s http://${{ secrets.SERVER_IP }}/api/health > /dev/null; then
              echo "✅ Healthy!"
              exit 0
            fi
            echo "Attempt $i/24..."
          done
          echo "❌ Health check failed"
          exit 1

    - name: Rollback on Failure
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🚨 Health check failed. Rolling back..."
          # Redeploy previous images
          docker service update --force --image $CURRENT_BACKEND foodapp_foodapp_backend
          docker service update --force --image $CURRENT_FRONTEND foodapp_foodapp_frontend
          sleep 10
          docker service ls