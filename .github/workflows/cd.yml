name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

    # ----------------------------
    # AWS LOGIN (OIDC)
    # ----------------------------
    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1

    # ----------------------------
    # ECR LOGIN
    # ----------------------------
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # ----------------------------
    # DEPLOY TO SWARM EC2
    # ----------------------------
    - name: Deploy to Swarm
      id: deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        script: |
          set +e

          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          STACK="foodapp"

          echo "=============================="
          echo "STARTING SWARM DEPLOY"
          echo "IMAGE_TAG: $IMAGE_TAG"
          echo "=============================="

          cd ~/swarmdocker
          git fetch --all
          git reset --hard origin/main
          git clean -fd

          # ----------------------------
          # ECR LOGIN
          # ----------------------------
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin $ECR_REGISTRY


          docker service ls --format "{{.Name}} {{.Image}}" > /tmp/prev_version.txt

          docker pull $ECR_REGISTRY/swarmtaskfbackend:$IMAGE_TAG
          docker pull $ECR_REGISTRY/swarmtaskfrontend:$IMAGE_TAG

          # ----------------------------
          # REMOVE OLD STACK SAFELY
          # ----------------------------
          docker stack rm $STACK || true
          echo "Waiting for stack removal..."
          sleep 25

          # ----------------------------
          # CREATE NGINX CONFIG
          # ----------------------------
          docker config rm nginx_conf 2>/dev/null || true
          docker config create nginx_conf ./nginx.conf

          # ----------------------------
          # DEPLOY STACK
          # ----------------------------
          IMAGE_TAG=$IMAGE_TAG \
            docker stack deploy \
              -c docker-compose.yml \
              $STACK \
              --with-registry-auth

          # ----------------------------
          # WAIT FUNCTION
          # ----------------------------
          wait_for_service() {
            SERVICE=$1
            TIMEOUT=120
            ELAPSED=0

            while true; do
              RUNNING=$(docker service ls \
                --filter "name=${STACK}_${SERVICE}" \
                --format "{{.Replicas}}" | cut -d'/' -f1)

              DESIRED=$(docker service ls \
                --filter "name=${STACK}_${SERVICE}" \
                --format "{{.Replicas}}" | cut -d'/' -f2)

              if [ "$RUNNING" = "$DESIRED" ] && [ "$RUNNING" != "0" ]; then
                echo "$SERVICE READY ($RUNNING/$DESIRED)"
                break
              fi

              if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                echo "TIMEOUT: $SERVICE"
                break
              fi

              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
          }

          wait_for_service "foodapp_backend"
          wait_for_service "foodapp_frontend"
          wait_for_service "foodapp_nginx"

          echo "WAITING EXTRA STABILIZATION..."
          sleep 15

          # ----------------------------
          # HEALTH CHECK
          # ----------------------------
          SUCCESS=false

          for i in $(seq 1 12); do
            BACKEND_OK=false
            FRONTEND_OK=false

            curl -f -s http://127.0.0.1/api/health > /dev/null && BACKEND_OK=true
            curl -f -s http://127.0.0.1/ > /dev/null && FRONTEND_OK=true

            echo "Attempt $i → backend:$BACKEND_OK frontend:$FRONTEND_OK"

            if [ "$BACKEND_OK" = "true" ] && [ "$FRONTEND_OK" = "true" ]; then
              SUCCESS=true
              break
            fi

            sleep 10
          done


          echo "=============================="
          echo "DEPLOY STATUS: $SUCCESS"
          echo "=============================="

          # IMPORTANT: control GitHub job status
          if [ "$SUCCESS" = "true" ]; then
            echo "HEALTH CHECK PASSED"
            exit 0
          else
            echo "HEALTH CHECK FAILED"
            exit 1
          fi

          