name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

    # ----------------------------
    # AWS OIDC LOGIN
    # ----------------------------
    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1

    # ----------------------------
    # ECR LOGIN
    # ----------------------------
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # ----------------------------
    # DEPLOY TO EC2 (SWARM)
    # ----------------------------
    - name: Deploy to Swarm
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        script: |
          set -e

          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          STACK="foodapp"

          echo "=============================="
          echo "STARTING SWARM DEPLOY"
          echo "IMAGE_TAG : $IMAGE_TAG"
          echo "ECR       : $ECR_REGISTRY"
          echo "=============================="

          # ----------------------------
          # PULL LATEST REPO
          # ----------------------------
          cd ~/swarmdocker
          git fetch --all
          git reset --hard origin/main
          git clean -fd

          # ----------------------------
          # ECR LOGIN ON EC2
          # ----------------------------
          echo "ECR LOGIN"
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

          # ----------------------------
          # PULL NEW IMAGES
          # ----------------------------
          echo "PULLING NEW IMAGES"
          docker pull $ECR_REGISTRY/swarmtaskfbackend:$IMAGE_TAG
          docker pull $ECR_REGISTRY/swarmtaskfrontend:$IMAGE_TAG

          # ----------------------------
          # RECREATE NGINX CONFIG
          # Swarm configs are immutable — must remove and recreate
          # on every deploy otherwise stack deploy fails
          # ----------------------------
          echo "RECREATING NGINX CONFIG"
          docker stack rm $STACK || true
          echo "Waiting for stack to fully remove..."
          sleep 20

          docker config rm ${STACK}_nginx_conf 2>/dev/null || true
          docker config rm nginx_conf           2>/dev/null || true
          docker config create nginx_conf ./nginx.conf
          echo "nginx_conf created ✓"

          # ----------------------------
          # DEPLOY STACK
          # Swarm rolling update starts here
          # update_config in docker-compose.yml controls this
          # ----------------------------
          echo "DEPLOYING STACK"
          IMAGE_TAG=$IMAGE_TAG \
            docker stack deploy \
              -c docker-compose.yml \
              $STACK \
              --with-registry-auth

          # ----------------------------
          # WAIT FOR SERVICES TO CONVERGE
          # Waits until running replicas == desired replicas
          # ----------------------------
          echo "WAITING FOR SERVICES TO CONVERGE"

          wait_for_service() {
            SERVICE=$1
            TIMEOUT=120
            ELAPSED=0
            echo "Waiting for ${STACK}_${SERVICE}..."
            while true; do
              RUNNING=$(docker service ls \
                --filter "name=${STACK}_${SERVICE}" \
                --format "{{.Replicas}}" | cut -d'/' -f1)
              DESIRED=$(docker service ls \
                --filter "name=${STACK}_${SERVICE}" \
                --format "{{.Replicas}}" | cut -d'/' -f2)
              if [ "$RUNNING" = "$DESIRED" ] && [ -n "$RUNNING" ] && [ "$RUNNING" != "0" ]; then
                echo "  ${SERVICE} converged ($RUNNING/$DESIRED) ✓"
                break
              fi
              if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                echo "  TIMEOUT: ${SERVICE} did not converge ($RUNNING/$DESIRED)"
                exit 1
              fi
              echo "  ${SERVICE}: $RUNNING/$DESIRED — waiting..."
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
          }

          wait_for_service "foodapp_backend"
          wait_for_service "foodapp_frontend"
          wait_for_service "foodapp_nginx"

          # Extra buffer — let app fully boot after converge
          echo "All services converged — waiting 20s for full boot..."
          sleep 20

          # ----------------------------
          # HEALTH CHECK — backend + frontend
          # 12 attempts x 10s = 2 minutes total
          # ----------------------------
          echo "RUNNING HEALTH CHECKS"

          SUCCESS=false

          for i in $(seq 1 12); do
            BACKEND_OK=false
            FRONTEND_OK=false

            curl -f -s --max-time 5 http://127.0.0.1/api/health > /dev/null && BACKEND_OK=true
            curl -f -s --max-time 5 http://127.0.0.1/           > /dev/null && FRONTEND_OK=true

            echo "Attempt $i/12 — backend: $BACKEND_OK | frontend: $FRONTEND_OK"

            if [ "$BACKEND_OK" = "true" ] && [ "$FRONTEND_OK" = "true" ]; then
              echo "Health checks passed!"
              SUCCESS=true
              break
            fi

            sleep 10
          done

          # ----------------------------
          # ROLLBACK IF HEALTH CHECK FAILED
          # docker service rollback uses rollback_config
          # from docker-compose.yml automatically
          # ----------------------------
          if [ "$SUCCESS" = "false" ]; then
            echo "=============================="
            echo "HEALTH CHECK FAILED — ROLLING BACK"
            echo "=============================="

            docker service rollback ${STACK}_foodapp_backend  || true
            docker service rollback ${STACK}_foodapp_frontend || true

            echo "Waiting 30s for rollback to complete..."
            sleep 30

            echo "Post-rollback service state:"
            docker service ls

            # Verify previous version healthy after rollback
            RB_BACKEND=false
            RB_FRONTEND=false
            curl -f -s --max-time 5 http://127.0.0.1/api/health > /dev/null && RB_BACKEND=true
            curl -f -s --max-time 5 http://127.0.0.1/           > /dev/null && RB_FRONTEND=true

            echo "=============================="
            echo "ROLLBACK HEALTH RESULT"
            echo "backend : $RB_BACKEND"
            echo "frontend: $RB_FRONTEND"
            echo "=============================="

            if [ "$RB_BACKEND" = "false" ] || [ "$RB_FRONTEND" = "false" ]; then
              echo "ROLLBACK ALSO FAILED — manual intervention needed!"
              docker service ls
              docker stack ps $STACK
              exit 1
            fi

            echo "Rollback successful — previous version is live"
            docker service ls
            exit 1   # still fail the GH Action so you get notified
          fi

          # ----------------------------
          # SUCCESS
          # ----------------------------
          echo "=============================="
          echo "DEPLOY SUCCESSFUL"
          echo "IMAGE_TAG: $IMAGE_TAG"
          echo "=============================="
          docker service ls
