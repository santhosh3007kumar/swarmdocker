name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

    # ----------------------------
    # AWS OIDC LOGIN
    # ----------------------------
    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1

    # ----------------------------
    # ECR LOGIN
    # ----------------------------
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # ----------------------------
    # DEPLOY TO EC2 (SWARM)
    # ----------------------------
    - name: Deploy to Swarm
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        script: |
          set +e   # ✅ allow script to continue even if health fails

          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          STACK="foodapp"

          echo "=============================="
          echo "STARTING SWARM DEPLOY"
          echo "IMAGE_TAG : $IMAGE_TAG"
          echo "ECR       : $ECR_REGISTRY"
          echo "=============================="

          # ----------------------------
          # PULL LATEST REPO
          # ----------------------------
          cd ~/swarmdocker
          git fetch --all
          git reset --hard origin/main
          git clean -fd

          # ----------------------------
          # ECR LOGIN ON EC2
          # ----------------------------
          echo "ECR LOGIN"
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

          # ----------------------------
          # PULL NEW IMAGES
          # ----------------------------
          echo "PULLING NEW IMAGES"
          docker pull $ECR_REGISTRY/swarmtaskfbackend:$IMAGE_TAG
          docker pull $ECR_REGISTRY/swarmtaskfrontend:$IMAGE_TAG

          # ----------------------------
          # RECREATE NGINX CONFIG
          # ----------------------------
          echo "RECREATING NGINX CONFIG"
          docker stack rm $STACK || true
          echo "Waiting for stack removal..."
          sleep 20

          docker config rm ${STACK}_nginx_conf 2>/dev/null || true
          docker config rm nginx_conf           2>/dev/null || true
          docker config create nginx_conf ./nginx.conf

          # ----------------------------
          # DEPLOY STACK
          # ----------------------------
          echo "DEPLOYING STACK"
          IMAGE_TAG=$IMAGE_TAG \
            docker stack deploy \
              -c docker-compose.yml \
              $STACK \
              --with-registry-auth

          # ----------------------------
          # WAIT FOR SERVICES
          # ----------------------------
          wait_for_service() {
            SERVICE=$1
            TIMEOUT=120
            ELAPSED=0

            while true; do
              RUNNING=$(docker service ls \
                --filter "name=${STACK}_${SERVICE}" \
                --format "{{.Replicas}}" | cut -d'/' -f1)
              DESIRED=$(docker service ls \
                --filter "name=${STACK}_${SERVICE}" \
                --format "{{.Replicas}}" | cut -d'/' -f2)

              if [ "$RUNNING" = "$DESIRED" ] && [ "$RUNNING" != "0" ]; then
                echo "${SERVICE} ready ($RUNNING/$DESIRED)"
                break
              fi

              if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                echo "Timeout waiting for $SERVICE"
                break
              fi

              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
          }

          wait_for_service "foodapp_backend"
          wait_for_service "foodapp_frontend"
          wait_for_service "foodapp_nginx"

          echo "Waiting extra 20s..."
          sleep 20

          # ----------------------------
          # HEALTH CHECK (INFO ONLY)
          # ----------------------------
          echo "RUNNING HEALTH CHECKS"

          SUCCESS=false

          for i in $(seq 1 12); do
            BACKEND_OK=false
            FRONTEND_OK=false

            curl -f -s http://127.0.0.1/api/health > /dev/null && BACKEND_OK=true
            curl -f -s http://127.0.0.1/           > /dev/null && FRONTEND_OK=true

            echo "Attempt $i → backend:$BACKEND_OK frontend:$FRONTEND_OK"

            if [ "$BACKEND_OK" = "true" ] && [ "$FRONTEND_OK" = "true" ]; then
              SUCCESS=true
              break
            fi

            sleep 10
          done

          echo "=============================="
      echo "DEPLOYMENT COMPLETED"
      echo "Health Status: $SUCCESS"
      echo "Waiting for manual review decision..."
      echo "=============================="
  # ----------------------------
  # APPROVAL STEP
  # ----------------------------
  approval:
    needs: deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Waiting for approval
        run: echo "Approve = rollback | Reject = keep deployment"

  # ----------------------------
  # MANUAL ROLLBACK
  # ----------------------------
  rollback:
    needs: approval
    runs-on: ubuntu-latest

    if: ${{ github.event.deployment_status.state == 'approved' }}

    steps:

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
          aws-region: us-east-1

      - name: Rollback application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            STACK="foodapp"

            echo "ROLLBACK STARTED"

            docker service rollback ${STACK}_foodapp_backend
            docker service rollback ${STACK}_foodapp_frontend
            docker service rollback ${STACK}_foodapp_nginx

            sleep 30
            docker service ls