name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # AWS OIDC LOGIN
    # ----------------------------
    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1

    # ----------------------------
    # ECR LOGIN
    # ----------------------------
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # ----------------------------
    # DEPLOY TO EC2 (SWARM)
    # ----------------------------
    - name: Deploy to Swarm
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        # pass registry correctly
        envs: ECR_REGISTRY

        script: |
          set -e

          # IMPORTANT: define registry properly (REQUIRED FIX)
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"

          echo "=============================="
          echo "🚀 STARTING SWARM DEPLOY"
          echo "=============================="

          cd ~/swarmdocker || exit 1

          echo "📥 Updating repo"
          if [ -d .git ]; then
            git reset --hard
            git pull origin main
          else
            git clone https://github.com/santhosh3007kumar/swarmdocker.git .
          fi

          echo "🔐 ECR LOGIN"
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

          echo "💾 BACKUP CURRENT IMAGES"

          BACKUP_BACKEND=$(docker service inspect foodapp_backend \
            --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null || true)

          BACKUP_FRONTEND=$(docker service inspect foodapp_frontend \
            --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null || true)

          echo "Backend Backup: $BACKUP_BACKEND"
          echo "Frontend Backup: $BACKUP_FRONTEND"

          echo "📦 PULL NEW IMAGES"

          docker pull $ECR_REGISTRY/swarmtaskfbackend:v1
          docker pull $ECR_REGISTRY/swarmtaskfrontend:v1

          echo "🚀 DEPLOY STACK"

          docker stack deploy -c docker-compose.yml foodapp

          echo "⏳ WAIT FOR SERVICES TO START"
          sleep 20

          echo "🏥 HEALTH CHECK"

          SUCCESS=false

          for i in $(seq 1 12); do
            sleep 5

            if curl -f -s http://127.0.0.1/api/health > /dev/null; then
              echo "✅ Health check passed"
              SUCCESS=true
              break
            fi

            echo "Attempt $i/12 failed..."
          done

          # ----------------------------
          # ROLLBACK IF FAILED
          # ----------------------------
          if [ "$SUCCESS" = false ]; then
            echo "❌ Health check failed - rolling back"

            if [ ! -z "$BACKUP_BACKEND" ]; then
              docker service update --force \
                --image $BACKUP_BACKEND foodapp_backend
            fi

            if [ ! -z "$BACKUP_FRONTEND" ]; then
              docker service update --force \
                --image $BACKUP_FRONTEND foodapp_frontend
            fi

            sleep 10

            echo "🔄 Rollback completed"
            docker service ls

            exit 1
          fi

          echo "🎉 DEPLOY SUCCESSFUL"
          docker service ls