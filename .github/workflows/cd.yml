name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1

    - name: ECR Login
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Deploy + Health Check + Rollback
      uses: appleboy/ssh-action@v1.0.3
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e

          cd ~/swarmdocker || exit 1

          echo "🚀 Pull latest repo"
          if [ -d .git ]; then
            git reset --hard
            git pull origin main
          else
            git clone https://github.com/santhosh3007kumar/swarmdocker.git .
          fi

          echo "🔐 Login to ECR"
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

          echo "💾 Saving current images (ROLLBACK SAFE)"
          BACKUP_BACKEND=$(docker service inspect --format='{{.Spec.TaskTemplate.ContainerSpec.Image}}' foodapp_foodapp_backend)
          BACKUP_FRONTEND=$(docker service inspect --format='{{.Spec.TaskTemplate.ContainerSpec.Image}}' foodapp_foodapp_frontend)

          echo "Backend: $BACKUP_BACKEND"
          echo "Frontend: $BACKUP_FRONTEND"

          echo "📥 Pull new images"
          docker pull $ECR_REGISTRY/swarmtaskfbackend:latest
          docker pull $ECR_REGISTRY/swarmtaskfrontend:latest

          echo "🚀 Deploy stack"
          docker stack deploy -c docker-compose.yml foodapp

          echo "⏳ Waiting for services..."
          sleep 20

          echo "🏥 Health Check"
          for i in {1..12}; do
            sleep 5
            if curl -f -s http://localhost/api/health > /dev/null; then
              echo "✅ Healthy!"
              exit 0
            fi
            echo "Attempt $i/12..."
          done

          echo "❌ Health check failed — rolling back"

          docker service update --force \
            --image $BACKUP_BACKEND foodapp_foodapp_backend

          docker service update --force \
            --image $BACKUP_FRONTEND foodapp_foodapp_frontend

          sleep 10

          echo "🔄 Rolled back successfully"
          docker service ls