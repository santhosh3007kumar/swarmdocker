name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - name: Configure AWS OIDC  # ✅ FIXED session name
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1
        role-session-name: GitHubActions-swarmdocker  # ✅ No slashes!

    - name: ECR Login
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Deploy Services
      uses: appleboy/ssh-action@v1.0.3
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin $ECR_REGISTRY
          
          docker pull $ECR_REGISTRY/swarmtaskfbackend:latest
          docker service update --force --image $ECR_REGISTRY/swarmtaskfbackend:latest foodapp_backend
          
          docker pull $ECR_REGISTRY/swarmtaskfrontend:latest  
          docker service update --force --image $ECR_REGISTRY/swarmtaskfrontend:latest foodapp_frontend
          
          sleep 10
          docker service ls foodapp

    - name: Health Check
      run: |
        for i in {1..12}; do
          sleep 5
          if curl -f -s http://${{ secrets.SERVER_IP }}/api/health > /dev/null; then
            echo "✅ Healthy!"
            exit 0
          fi
          echo "Attempt $i/12..."
        done
        echo "❌ Health check failed"
        exit 1

    - name: Rollback on Failure  # ✅ FIXED rollback logic
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🚨 Rolling back..."
          docker service rollback foodapp_backend 2>/dev/null || echo "No previous version"
          docker service rollback foodapp_frontend 2>/dev/null || echo "No previous version"
          docker service ls foodapp