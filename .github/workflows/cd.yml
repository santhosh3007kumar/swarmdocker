name: CD - Deploy to EC2 Swarm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:

# ============================
# DEPLOY JOB
# ============================
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

    - name: Configure AWS OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/myoidcrole
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Deploy to Swarm
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        script: |
          set -e

          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          STACK="foodapp"

          cd ~/swarmdocker
          git fetch --all
          git reset --hard origin/main
          git clean -fd

          echo "Saving previous versions..."

          docker service inspect ${STACK}_foodapp_backend >/dev/null 2>&1 && \
          echo "backend $(docker service inspect ${STACK}_foodapp_backend --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}')" > /tmp/prev_version.txt || echo "backend none" > /tmp/prev_version.txt

          docker service inspect ${STACK}_foodapp_frontend >/dev/null 2>&1 && \
          echo "frontend $(docker service inspect ${STACK}_foodapp_frontend --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}')" >> /tmp/prev_version.txt || echo "frontend none" >> /tmp/prev_version.txt

          # ECR LOGIN
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

          # PULL IMAGES
          docker pull $ECR_REGISTRY/swarmtaskfbackend:$IMAGE_TAG
          docker pull $ECR_REGISTRY/swarmtaskfrontend:$IMAGE_TAG

          # REMOVE OLD STACK
          echo "Removing old stack..."
          docker stack rm $STACK || true
          sleep 20

          # DEPLOY NEW STACK
          IMAGE_TAG=$IMAGE_TAG docker stack deploy \
            -c docker-compose.yml \
            $STACK \
            --with-registry-auth

          sleep 20

          # ============================
          # HEALTH CHECK LOOP
          # ============================
          SUCCESS=false

          for i in $(seq 1 12); do
            curl -f -s http://127.0.0.1/api/health && BACKEND=true || BACKEND=false
            curl -f -s http://127.0.0.1/ && FRONTEND=true || FRONTEND=false

            echo "Attempt $i → backend:$BACKEND frontend:$FRONTEND"

            if [ "$BACKEND" = "true" ] && [ "$FRONTEND" = "true" ]; then
              SUCCESS=true
              break
            fi

            sleep 10
          done

          # ============================
          # RESULT HANDLING
          # ============================
          if [ "$SUCCESS" = "true" ]; then
            echo "HEALTH CHECK PASSED"

            echo "Cleaning old images..."

            docker images --format "{{.Repository}}:{{.Tag}}" | grep swarmtask | sort -u > /tmp/all_images.txt

            CURRENT_BACKEND=$ECR_REGISTRY/swarmtaskfbackend:$IMAGE_TAG
            CURRENT_FRONTEND=$ECR_REGISTRY/swarmtaskfrontend:$IMAGE_TAG

            PREV_BACKEND=$(grep "^backend " /tmp/prev_version.txt | awk '{print $2}')
            PREV_FRONTEND=$(grep "^frontend " /tmp/prev_version.txt | awk '{print $2}')

            for img in $(cat /tmp/all_images.txt); do
              if [[ "$img" != "$CURRENT_BACKEND" && "$img" != "$CURRENT_FRONTEND" && "$img" != "$PREV_BACKEND" && "$img" != "$PREV_FRONTEND" ]]; then
                echo "Removing $img"
                docker rmi -f $img || true
              fi
            done

            exit 0
          else
            echo "HEALTH CHECK FAILED"
            exit 1
          fi


# ============================
# ROLLBACK JOB
# ============================
  rollback:
    needs: deploy
    if: ${{ needs.deploy.result == 'failure' }}
    runs-on: ubuntu-latest

    steps:

    - name: Execute Rollback on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        script: |
          set -e
          STACK="foodapp"

          echo "ROLLBACK STARTED"

          BACKEND_IMAGE=$(grep backend /tmp/prev_version.txt | awk '{print $2}')
          FRONTEND_IMAGE=$(grep frontend /tmp/prev_version.txt | awk '{print $2}')

          docker service update --image $BACKEND_IMAGE ${STACK}_foodapp_backend
          docker service update --image $FRONTEND_IMAGE ${STACK}_foodapp_frontend

          echo "ROLLBACK DONE"
          docker service ls